name: CI

on:

    pull_request:
        
        branches: [ master ]

jobs:

    ci:

    runs-on: ubuntu-latest
    
    steps:

        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable

        - run: cargo build
        - run: cargo test -- --nocapture

        - if: success()

        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        
        env:
        
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
